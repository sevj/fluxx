services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        Fluxx\Workflow\WorkflowInterface:
            tags: ['fluxx.workflow']
        Fluxx\StepType\StepTypeProviderInterface:
            tags: ['fluxx.step_type_provider']

    Fluxx\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/FluxxBundle.php'

    Fluxx\Workflow\SynchronizationRegistry:
        arguments:
            $workflows: !tagged_iterator { tag: fluxx.workflow }

    Fluxx\StepType\StepTypeRegistry:
        arguments:
            $providers: !tagged_iterator { tag: fluxx.step_type_provider }

    Fluxx\Workflow\Lock\WorkflowExecutionLockManagerInterface: '@Fluxx\Workflow\Lock\WorkflowExecutionLockManager'
    Fluxx\Repository\WorkflowExecutionLockStoreInterface: '@Fluxx\Repository\WorkflowExecutionLockRepository'
    Fluxx\Repository\WorkflowRunLookupInterface: '@Fluxx\Repository\WorkflowRunRepository'
    Fluxx\Repository\RuntimeWorkerStateLookupInterface: '@Fluxx\Repository\RuntimeWorkerStateRepository'
